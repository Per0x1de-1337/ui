services:
  frontend:
    build:
      dockerfile: Dockerfile
      args:
        - VITE_BASE_URL=http://localhost:4000
        - VITE_SKIP_PREREQUISITES_CHECK=true
        - VITE_APP_VERSION=0.1.0
    ports:
      - '5173:80'
    depends_on:
      - backend
    environment:
      - VITE_SKIP_PREREQUISITES_CHECK=true
      - VITE_BASE_URL=http://localhost:4000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    volumes:
      - ~/.kube:/root/.kube
    environment:
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - CORS_ALLOWED_ORIGIN=http://localhost:5173
    depends_on:
      - redis
    network_mode: 'host'

  redis:
    image: 'redis:latest'
    container_name: 'kubestellar-redis'
    ports:
      - '6379:6379'
    network_mode: 'host'

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    # networks:
    #   - monitoring 
    network_mode: 'host'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources.yml
      - ./grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards.yml
      - ./grafana/dashboards:/etc/grafana/dashboards
    network_mode: 'host'

networks:
  monitoring: